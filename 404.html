<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Page not found — Bento Almeida</title>
    <link href="assets/img/favicon.ico" rel="icon" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --ink: #0a0d14;
            --accent: #f5b301;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 24px;
            background:
                radial-gradient(circle at 70% 15%, rgba(245, 179, 1, 0.14), transparent 55%),
                var(--ink);
            color: #c4cbd9;
            font-family: "Inter", system-ui, sans-serif;
        }

        .code {
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(5rem, 20vw, 10rem);
            font-weight: 600;
            line-height: 1;
            color: #fff;
            letter-spacing: -0.03em;
        }

        .code span { color: var(--accent); }

        h1 {
            font-family: "Space Grotesk", sans-serif;
            font-weight: 600;
            color: #fff;
            font-size: 1.5rem;
            margin: 18px 0 10px;
        }

        p { max-width: 42ch; margin: 0 auto 28px; color: #858ea1; }

        a.home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: "Space Grotesk", sans-serif;
            font-weight: 500;
            text-decoration: none;
            background: var(--accent);
            color: #10131a;
            padding: 13px 26px;
            border-radius: 999px;
            transition: transform 0.18s ease, background 0.2s ease;
        }

        a.home:hover { transform: translateY(-2px); background: #ffc22e; }

        .mark {
            font-family: "Space Grotesk", sans-serif;
            color: #fff;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .mark span { color: var(--accent); }
    </style>
</head>

<body>
    <div>
        <div class="mark"><span>◢</span> Bento&nbsp;Almeida</div>
        <div class="code">4<span>0</span>4</div>
        <h1>This page took a wrong turn.</h1>
        <p>The page you're looking for doesn't exist or has moved. Let's get you back to solid ground.</p>
        <a class="home" href="/">← Back to home</a>
    </div>
</body>

</html>
